workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - test

variables:
  NPM_CACHE_FOLDER: '$CI_PROJECT_DIR/.npm'

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/

# Os testes E2E mobile necessitam de simulador/emulador local ou de credenciais BrowserStack.
# Configure variáveis no GitLab (Settings → CI/CD → Variables).

e2e_browserstack_android:
  stage: test
  image: node:20-bookworm
  rules:
    - if: $BROWSERSTACK_USERNAME && $BROWSERSTACK_ACCESS_KEY && $BROWSERSTACK_APP_URL
  script:
    - npm ci --cache "$NPM_CACHE_FOLDER"
    - npm run test:bs
  artifacts:
    when: always
    paths:
      - allure-results/
      - artifacts/
    expire_in: 14 days

e2e_android_local_emulator:
  stage: test
  image: node:20-bookworm
  rules:
    - when: manual
      allow_failure: true
  script:
    - echo "Requer runner com Android SDK, emulador e Appium. Em alternativa, execute localmente: npm run test:android"
    - mkdir -p apps
    - |
      curl -fsSL -o apps/android.wdio.native.app.v2.2.0.apk \
        "https://github.com/webdriverio/native-demo-app/releases/download/v2.2.0/android.wdio.native.app.v2.2.0.apk"
    - npm ci --cache "$NPM_CACHE_FOLDER"
    - npm run test:android
  artifacts:
    when: always
    paths:
      - allure-results/
      - artifacts/
    expire_in: 7 days
